<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gada Terminal</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent-color: #4ec94e;
      --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'Cascadia Code', Consolas, monospace;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1e1e1e;
      font-family: var(--font-ui);
      color: #e0e0e0;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    #titlebar {
      height: 32px;
      flex-shrink: 0;
      -webkit-app-region: drag;
      background: var(--accent-color);
      display: flex;
      align-items: center;
      padding: 0 12px;
    }

    #titlebar-text {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 500;
      color: #ffffff;
      user-select: none;
      pointer-events: none;
    }

    #main-content {
      flex: 1;
      display: flex;
      flex-direction: row;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Terminal ── */

    #terminal-container {
      flex: 1;
      height: 100%;
      overflow: hidden;
      position: relative;
      min-width: 0;
    }

    #terminal-container.drag-over::after {
      content: 'Drop files here';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-ui);
      font-size: 18px;
      color: #4ec94e;
      background: rgba(30, 30, 30, 0.75);
      outline: 2px dashed #4ec94e;
      outline-offset: -4px;
      pointer-events: none;
      z-index: 100;
    }

    /* ── Panel (sidebar) ── */

    #panel {
      width: 350px;
      min-width: 350px;
      height: 100%;
      background: #181818;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #2a2a2a;
      overflow: hidden;
    }

    /* Toggle bar */
    #panel-toggle-bar {
      display: flex;
      flex-direction: row;
      gap: 2px;
      padding: 5px 8px;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
      align-items: center;
    }

    #panel-toggle-label {
      font-size: 10px;
      color: #444;
      margin-right: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }

    .panel-toggle-btn {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 7px;
      border-radius: 3px;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: #444;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }

    /* active = section is VISIBLE */
    .panel-toggle-btn.active {
      border-color: #3a3a3a;
      color: #aaa;
      background: #242424;
    }

    .panel-toggle-btn:disabled {
      color: #2e2e2e;
      border-color: #222;
      cursor: default;
    }

    /* Sections container */
    #panel-sections {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Panel section — each visible section gets an equal share of the panel height */
    .panel-section {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
      min-height: 80px;
    }

    .panel-section.hidden {
      display: none;
    }

    .panel-section.drag-target-above {
      border-top: 2px solid #4eb8e8;
    }

    .panel-section-header {
      display: flex;
      align-items: center;
      padding: 7px 12px;
      border-bottom: 1px solid #222;
      cursor: grab;
      flex-shrink: 0;
      user-select: none;
    }

    .panel-section-header:active {
      cursor: grabbing;
    }

    .panel-section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #666;
    }

    .panel-section-body {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* ── Tool cards ── */

    .tool-card {
      background: #212121;
      border: 1px solid #2e2e2e;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.1s;
    }

    .tool-card:hover {
      border-color: #3a3a3a;
    }

    .tool-card-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
    }

    .tool-card-time {
      font-family: var(--font-mono);
      font-size: 10px;
      color: #484848;
      flex-shrink: 0;
    }

    .tool-card-name {
      font-size: 12px;
      font-weight: 600;
      color: #d0d0d0;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tool-badge {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 5px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .tool-badge.running { background: #2e2210; color: #e8a838; border: 1px solid #5a3e10; }
    .tool-badge.done    { background: #122212; color: #4ec94e; border: 1px solid #1e4a1e; }
    .tool-badge.failed  { background: #2e1212; color: #e84e4e; border: 1px solid #5a1e1e; }

    .tool-card-target {
      padding: 0 8px 6px 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: #777;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tool-card-details {
      display: none;
      padding: 6px 8px;
      border-top: 1px solid #2a2a2a;
      font-family: var(--font-mono);
      font-size: 10px;
      color: #777;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }

    .tool-card.expanded .tool-card-details {
      display: block;
    }

    /* ── Launch screen overlay ── */

    #launch-screen {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(30, 30, 30, 0.97);
    }

    #launch-screen.hidden {
      display: none;
    }

    .launch-card {
      width: 480px;
      background: #242424;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .launch-card h2 {
      font-size: 16px;
      font-weight: 600;
      color: #e0e0e0;
      letter-spacing: 0.02em;
    }

    .card-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-section > label:first-child {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
    }

    .dir-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #selected-dir-display {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 12px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #selected-dir-display.has-path {
      color: #cccccc;
    }

    #recent-folders-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-height: 120px;
      overflow-y: auto;
    }

    .recent-folder-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 12px;
      color: #aaa;
      transition: background 0.1s;
    }

    .recent-folder-item:hover {
      background: #2e2e2e;
      color: #e0e0e0;
    }

    .recent-folder-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
    }

    .recent-folder-path {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .accent-row {
      flex-direction: row !important;
      align-items: center;
      gap: 10px;
    }

    .accent-row > label:first-child {
      flex-shrink: 0;
    }

    #accent-color-input {
      width: 36px;
      height: 28px;
      padding: 2px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #2a2a2a;
      cursor: pointer;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .option-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .option-group label {
      font-size: 12px;
      color: #aaa;
    }

    .permission-mode-group {
      grid-column: 1 / -1;
    }

    .switch-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 12px;
      color: #aaa;
      user-select: none;
    }

    .toggle-switch {
      appearance: none;
      position: relative;
      width: 32px;
      height: 18px;
      background: #444;
      border-radius: 9px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: #ccc;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle-switch:checked {
      background: #4ec94e;
    }

    .toggle-switch:checked::after {
      transform: translateX(14px);
      background: #fff;
    }

    select {
      background: #2a2a2a;
      color: #cccccc;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 5px 8px;
      font-family: var(--font-mono);
      font-size: 12px;
      cursor: pointer;
      width: 100%;
    }

    select:focus {
      outline: 1px solid #555;
    }

    input[type="text"] {
      background: #2a2a2a;
      color: #cccccc;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 6px 10px;
      font-family: var(--font-mono);
      font-size: 12px;
      width: 100%;
    }

    input[type="text"]:focus {
      outline: 1px solid #555;
    }

    input[type="text"]::placeholder {
      color: #555;
    }

    button {
      font-family: var(--font-ui);
      font-size: 12px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #2a2a2a;
      color: #cccccc;
      padding: 5px 12px;
      cursor: pointer;
      transition: background 0.1s;
      white-space: nowrap;
    }

    button:hover {
      background: #333;
    }

    #btn-start {
      background: #2a3d2a;
      border-color: #4ec94e;
      color: #4ec94e;
      font-size: 13px;
      font-weight: 600;
      padding: 10px;
      width: 100%;
    }

    #btn-start:hover {
      background: #344d34;
    }

    /* ── Cost & Context panels ── */

    .cost-summary {
      padding: 8px 10px 10px;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.1s;
    }

    .cost-summary:hover {
      background: #242424;
    }

    .cost-summary-total {
      display: block;
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 700;
      color: #e0e0e0;
      margin-bottom: 8px;
    }

    .cost-summary-stats {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .cost-stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 1px 0;
      color: #666;
    }

    .cost-stat-row span:last-child {
      font-family: var(--font-mono);
      color: #888;
    }

    /* Cost breakdown popup */

    .cost-popup {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cost-popup.hidden { display: none; }

    .cost-popup-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
    }

    .cost-popup-card {
      position: relative;
      width: 340px;
      max-height: 70vh;
      background: #242424;
      border: 1px solid #333;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .cost-popup-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid #2e2e2e;
      font-size: 12px;
      font-weight: 600;
      color: #aaa;
      flex-shrink: 0;
    }

    .cost-popup-header button {
      background: none;
      border: none;
      color: #555;
      font-size: 16px;
      line-height: 1;
      padding: 0 2px;
      cursor: pointer;
    }

    .cost-popup-header button:hover { color: #aaa; background: none; }

    .cost-popup-list {
      overflow-y: auto;
      flex: 1;
      padding: 6px 0;
    }

    .cost-popup-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 5px 14px;
    }

    .cost-popup-item:hover { background: #2a2a2a; }

    .cost-popup-time {
      font-family: var(--font-mono);
      font-size: 10px;
      color: #484848;
      flex-shrink: 0;
    }

    .cost-popup-model {
      font-family: var(--font-mono);
      font-size: 11px;
      color: #777;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cost-popup-cost {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      color: #d0d0d0;
      flex-shrink: 0;
    }

    /* Context progress bar */

    .ctx-bar-wrap {
      padding: 8px 8px 4px;
      flex-shrink: 0;
    }

    .ctx-bar-track {
      height: 8px;
      background: #2a2a2a;
      border-radius: 4px;
      overflow: hidden;
    }

    .ctx-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s, background 0.3s;
      background: #4ec94e;
    }

    .ctx-bar-fill.warn  { background: #e8a838; }
    .ctx-bar-fill.danger { background: #e84e4e; }

    .ctx-stats {
      padding: 4px 8px 6px;
      flex-shrink: 0;
    }

    .ctx-stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      padding: 1px 0;
    }

    .ctx-stat-label { color: #555; }
    .ctx-stat-value { font-family: var(--font-mono); color: #888; }
    .ctx-stat-row.total .ctx-stat-label { color: #888; font-weight: 600; }
    .ctx-stat-row.total .ctx-stat-value { color: #d0d0d0; font-weight: 600; }

    /* ── Permission cards ── */

    .perm-card {
      background: #1e1a10;
      border: 1px solid #5a3e10;
      border-radius: 4px;
      overflow: hidden;
    }

    .perm-card.decided {
      background: #212121;
      border-color: #2e2e2e;
    }

    .perm-card-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
    }

    .perm-card-time {
      font-family: var(--font-mono);
      font-size: 10px;
      color: #484848;
      flex-shrink: 0;
    }

    .perm-card-name {
      font-size: 12px;
      font-weight: 600;
      color: #e8a838;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .perm-card.decided .perm-card-name { color: #d0d0d0; }

    .perm-badge {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 5px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .perm-badge.pending  { background: #2e2210; color: #e8a838; border: 1px solid #5a3e10; }
    .perm-badge.allowed  { background: #122212; color: #4ec94e; border: 1px solid #1e4a1e; }
    .perm-badge.session  { background: #0e1a22; color: #4eb8e8; border: 1px solid #1e3a5a; }
    .perm-badge.denied   { background: #2e1212; color: #e84e4e; border: 1px solid #5a1e1e; }

    .perm-card-target {
      padding: 0 8px 6px 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: #777;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .perm-card-actions {
      display: flex;
      gap: 4px;
      padding: 0 8px 8px 8px;
    }

    .perm-card.decided .perm-card-actions { display: none; }

    .perm-btn {
      flex: 1;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 6px;
      border-radius: 3px;
      cursor: pointer;
      border: 1px solid;
      font-family: var(--font-ui);
      transition: opacity 0.1s;
    }

    .perm-btn:hover { opacity: 0.8; background: inherit; }

    .perm-btn.allow   { background: #1a2e1a; color: #4ec94e; border-color: #2a5a2a; }
    .perm-btn.session { background: #0e1a2e; color: #4eb8e8; border-color: #1e3a5a; }
    .perm-btn.deny    { background: #2e1a1a; color: #e84e4e; border-color: #5a2a2a; }

    /* ── Scrollbars ── */

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #444;
    }
  </style>
</head>
<body>

  <div id="titlebar"><span id="titlebar-text">Gada Terminal</span></div>

  <!-- Launch screen overlay -->
  <div id="launch-screen">
    <div class="launch-card">
      <h2>Gada Terminal</h2>

      <div class="card-section">
        <label>Working Directory</label>
        <div class="dir-row">
          <span id="selected-dir-display">(current directory)</span>
          <button id="btn-pick-folder">Open Folder…</button>
        </div>
        <ul id="recent-folders-list"></ul>
      </div>

      <div class="card-section accent-row">
        <label>Accent colour</label>
        <input type="color" id="accent-color-input" value="#4ec94e" />
        <button id="btn-reset-accent">Reset</button>
      </div>

      <div class="card-section">
        <label>Options</label>
        <div class="options-grid">
          <div class="option-group">
            <label class="switch-label">
              <input type="checkbox" id="opt-resume" class="toggle-switch" />
              Resume last session
            </label>
          </div>
          <div class="option-group">
            <label class="switch-label">
              <input type="checkbox" id="opt-continue" class="toggle-switch" />
              Continue conversation
            </label>
          </div>
          <div class="option-group">
            <label for="opt-model">Model</label>
            <select id="opt-model">
              <option value="">(default)</option>
              <option value="opus">Opus</option>
              <option value="sonnet">Sonnet</option>
              <option value="haiku">Haiku</option>
            </select>
          </div>
          <div class="option-group">
            <label for="opt-effort">Effort</label>
            <select id="opt-effort">
              <option value="">(default)</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="max">Max</option>
            </select>
          </div>
          <div class="option-group permission-mode-group">
            <label for="opt-permission-mode">Permission mode</label>
            <select id="opt-permission-mode">
              <option value="">(default)</option>
              <option value="auto">Auto</option>
              <option value="acceptEdits">Accept edits</option>
              <option value="plan">Plan</option>
              <option value="bypassPermissions">Bypass permissions</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card-section">
        <label for="extra-args-input">Additional arguments</label>
        <input type="text" id="extra-args-input" placeholder="--verbose --no-stream …" />
      </div>

      <button id="btn-start">Start Claude</button>
    </div>
  </div>

  <div id="main-content">

  <!-- Terminal -->
  <div id="terminal-container"></div>

  <!-- Side panel -->
  <div id="panel">
    <div id="panel-toggle-bar">
      <span id="panel-toggle-label">Show</span>
      <button class="panel-toggle-btn active" data-section="tools" title="Toggle Tools">Tools</button>
      <button class="panel-toggle-btn" data-section="permissions" title="Toggle Permissions">Perm</button>
      <button class="panel-toggle-btn" data-section="cost" title="Toggle Cost">Cost</button>
      <button class="panel-toggle-btn" data-section="context" title="Toggle Context">Ctx</button>
    </div>
    <div id="panel-sections">
      <div class="panel-section" id="section-tools" draggable="true" data-section-id="tools">
        <div class="panel-section-header">
          <span class="panel-section-title">Tools</span>
        </div>
        <div class="panel-section-body" id="tools-feed"></div>
      </div>
      <div class="panel-section hidden" id="section-permissions" draggable="true" data-section-id="permissions">
        <div class="panel-section-header"><span class="panel-section-title">Permissions</span></div>
        <div class="panel-section-body" id="permissions-feed"></div>
      </div>
      <div class="panel-section hidden" id="section-cost" draggable="true" data-section-id="cost">
        <div class="panel-section-header"><span class="panel-section-title">Cost</span></div>
        <div class="panel-section-body" id="cost-feed">
          <div class="cost-summary" id="cost-summary" title="Click for request breakdown">
            <span class="cost-summary-total" id="cost-total">$0.0000</span>
            <div class="cost-summary-stats">
              <div class="cost-stat-row"><span>Input</span><span id="cost-s-input">0</span></div>
              <div class="cost-stat-row"><span>Output</span><span id="cost-s-output">0</span></div>
              <div class="cost-stat-row"><span>Cache Read</span><span id="cost-s-cache-read">0</span></div>
              <div class="cost-stat-row"><span>Cache Write</span><span id="cost-s-cache-write">0</span></div>
              <div class="cost-stat-row"><span>Requests</span><span id="cost-s-requests">0</span></div>
            </div>
          </div>
        </div>
      </div>
      <div class="panel-section hidden" id="section-context" draggable="true" data-section-id="context">
        <div class="panel-section-header"><span class="panel-section-title">Context</span></div>
        <div class="ctx-bar-wrap">
          <div class="ctx-bar-track"><div class="ctx-bar-fill" id="ctx-bar" style="width:0%"></div></div>
        </div>
        <div class="ctx-stats">
          <div class="ctx-stat-row total">
            <span class="ctx-stat-label" id="ctx-used-label">0 / 200,000 tokens</span>
            <span class="ctx-stat-value" id="ctx-pct">0%</span>
          </div>
          <div class="ctx-stat-row">
            <span class="ctx-stat-label">Input</span>
            <span class="ctx-stat-value" id="ctx-input">0</span>
          </div>
          <div class="ctx-stat-row">
            <span class="ctx-stat-label">Cache Read</span>
            <span class="ctx-stat-value" id="ctx-cache-read">0</span>
          </div>
          <div class="ctx-stat-row">
            <span class="ctx-stat-label">Cache Write</span>
            <span class="ctx-stat-value" id="ctx-cache-write">0</span>
          </div>
          <div class="ctx-stat-row">
            <span class="ctx-stat-label">Output</span>
            <span class="ctx-stat-value" id="ctx-output">0</span>
          </div>
        </div>
        <div class="panel-section-body" id="context-feed"></div>
      </div>
    </div>
  </div>

  </div> <!-- #main-content -->

  <!-- Cost breakdown popup -->
  <div id="cost-breakdown-popup" class="cost-popup hidden">
    <div class="cost-popup-backdrop" id="cost-popup-backdrop"></div>
    <div class="cost-popup-card">
      <div class="cost-popup-header">
        <span>Request Breakdown</span>
        <button id="cost-popup-close">×</button>
      </div>
      <div class="cost-popup-list" id="cost-popup-list"></div>
    </div>
  </div>

  <script type="module" src="/src/renderer.ts"></script>
</body>
</html>
